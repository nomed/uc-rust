schema_version: 1
project: uc-rust
context_root: .context

precedence:
  - current_human_instruction
  - accepted_decisions
  - accepted_rfcs
  - project_charter_and_target_architecture
  - nearest_agents_md
  - governing_issue_and_pull_request
  - latest_accepted_handoff
  - sessions
  - temporary_notes

records:
  decisions:
    path: .context/decisions
    id_pattern: "ADR-{number:04d}"
    statuses: [proposed, accepted, rejected, superseded, deprecated]
    immutable_after_acceptance: true
  rfcs:
    path: .context/rfcs
    id_pattern: "RFC-{number:04d}"
    statuses: [draft, proposed, accepted, rejected, postponed, superseded]
    required_for:
      - substantial_domain_change
      - public_contract_change
      - deployment_topology_change
      - security_model_change
      - release_or_packaging_model_change
      - persistent_data_ownership_change
      - new_external_platform_dependency
  handoffs:
    path: .context/handoffs
    id_pattern: "HANDOFF-{date}-{sequence:02d}"
    retention: durable
  sessions:
    path: .context/sessions
    id_pattern: "SESSION-{date}-{sequence:02d}"
    authoritative: false

templates:
  decision: .context/templates/decision.md
  rfc: .context/templates/rfc.md
  handoff: .context/templates/handoff.md
  session: .context/templates/session.md

role_loading:
  orchestrator:
    required: [manifest, agents, project_charter, accepted_decisions, accepted_rfcs, roadmap]
  product_analyst:
    required: [manifest, agents, project_charter, glossary, accepted_decisions]
  domain_architect:
    required: [manifest, agents, project_charter, target_architecture, accepted_decisions, accepted_rfcs]
  implementation_agent:
    required: [manifest, agents, governing_issue, accepted_decisions, accepted_rfcs, latest_handoff]
  verification_agent:
    required: [manifest, agents, governing_issue, acceptance_criteria, changed_files, latest_handoff]
  security_agent:
    required: [manifest, agents, security_policy, threat_model, accepted_decisions, accepted_rfcs]
  release_agent:
    required: [manifest, agents, release_policy, accepted_decisions, accepted_rfcs]

write_policy:
  sessions: agents_allowed
  handoffs: agents_allowed
  decisions: proposal_allowed_human_acceptance_required
  rfcs: draft_allowed_human_acceptance_required
  architecture_change_without_record: forbidden
  destructive_operation_without_explicit_approval: forbidden
