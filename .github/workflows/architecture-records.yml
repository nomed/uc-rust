name: Architecture records

on:
  pull_request:
    paths:
      - "docs/knowledge/records/**"
      - "docs/knowledge/record-identifiers-and-versioning.md"
      - "docs/knowledge/relationship-model.md"
      - "docs/knowledge/graph-views-and-integrity.md"
      - ".context/decisions/**"
      - ".context/rfcs/**"
      - ".context/templates/decision.md"
      - ".context/templates/rfc.md"
      - "governance/record-migration-registry.yaml"
      - "governance/namespace-authorities.yaml"
      - "schemas/**"
      - "scripts/validate_records.py"
      - "scripts/validate_record_graph.py"
      - "scripts/validate_record_changes.py"
      - "scripts/inventory_legacy_records.py"
      - "tests/fixtures/records/**"
      - "tests/test_record_validator.py"
      - "requirements-dev.txt"
      - ".github/workflows/architecture-records.yml"
  push:
    branches: [main]
    paths:
      - "docs/knowledge/records/**"
      - "docs/knowledge/record-identifiers-and-versioning.md"
      - "docs/knowledge/relationship-model.md"
      - "docs/knowledge/graph-views-and-integrity.md"
      - ".context/decisions/**"
      - ".context/rfcs/**"
      - ".context/templates/decision.md"
      - ".context/templates/rfc.md"
      - "governance/record-migration-registry.yaml"
      - "governance/namespace-authorities.yaml"
      - "schemas/**"
      - "scripts/validate_records.py"
      - "scripts/validate_record_graph.py"
      - "scripts/validate_record_changes.py"
      - "scripts/inventory_legacy_records.py"
      - "tests/fixtures/records/**"
      - "tests/test_record_validator.py"
      - "requirements-dev.txt"
      - ".github/workflows/architecture-records.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create isolated Python environment
        shell: bash
        run: |
          set -euo pipefail
          python3 --version
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Validate canonical records
        run: python scripts/validate_records.py docs/knowledge/records
      - name: Validate record graph integrity
        run: python scripts/validate_record_graph.py docs/knowledge/records
      - name: Validate record lifecycle transitions
        if: github.event_name == 'pull_request'
        run: python scripts/validate_record_changes.py --base-ref origin/${{ github.base_ref }} docs/knowledge/records
      - name: Validate legacy migration inventory
        shell: bash
        run: |
          set -o pipefail
          python scripts/inventory_legacy_records.py \
            --check \
            --format markdown \
            --output legacy-record-inventory.md \
            2> legacy-record-errors.log
      - name: Run validator fixtures
        run: python tests/test_record_validator.py
      - name: Upload architecture validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-record-evidence
          path: |
            legacy-record-inventory.md
            legacy-record-errors.log
          if-no-files-found: warn
          retention-days: 7
