name: Lockfile refresh evidence

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**/Cargo.toml"
      - "crates/**/Cargo.toml"
      - ".github/workflows/lockfile-refresh.yml"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
      - name: Regenerate canonical lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-lockfile
          cargo metadata --locked --no-deps --format-version 1 >/dev/null
      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: canonical-cargo-lock
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
