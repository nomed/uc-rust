name: Lockfile refresh evidence

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**/Cargo.toml"
      - "crates/**/Cargo.toml"
      - ".github/workflows/lockfile-refresh.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
      - name: Regenerate canonical lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-lockfile
          cargo metadata --locked --no-deps --format-version 1 >/dev/null
      - name: Commit canonical lockfile when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock is already canonical"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: refresh canonical Cargo.lock"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: canonical-cargo-lock
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
