name: Runtime Foundation

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/uc-cli/**"
      - "crates/uc-operation/**"
      - "crates/uc-runtime/**"
      - "crates/uc-config/**"
      - "crates/uc-adapters/**"
      - "proto/**"
      - "scripts/check_rust_documentation.py"
      - "buf.yaml"
      - ".github/workflows/runtime-foundation.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/uc-cli/**"
      - "crates/uc-operation/**"
      - "crates/uc-runtime/**"
      - "crates/uc-config/**"
      - "crates/uc-adapters/**"
      - "proto/**"
      - "scripts/check_rust_documentation.py"
      - "buf.yaml"
      - ".github/workflows/runtime-foundation.yml"

permissions:
  contents: read

env:
  RUNTIME_PACKAGES: >-
    -p uc-operation
    -p uc-runtime
    -p uc-config
    -p uc-adapters
    -p uc-cli
  COVERAGE_PACKAGES: >-
    -p uc-operation
    -p uc-runtime
    -p uc-config
    -p uc-adapters

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          components: rustfmt,clippy,llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Normalize formatting
        shell: bash
        run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch
      - name: Check Runtime Foundation slice
        shell: bash
        run: |
          set -o pipefail
          cargo check $RUNTIME_PACKAGES --all-targets 2>&1 | tee runtime-check.log
      - name: Clippy with warnings denied
        shell: bash
        run: |
          set -o pipefail
          cargo clippy $RUNTIME_PACKAGES --all-targets -- -D warnings 2>&1 | tee runtime-clippy.log
      - name: Verify rigorous code documentation
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/check_rust_documentation.py 2>&1 | tee runtime-documentation.log
          RUSTDOCFLAGS='-D warnings' cargo doc $RUNTIME_PACKAGES --no-deps 2>&1 | tee runtime-rustdoc.log
      - name: Test CLI composition root
        shell: bash
        run: |
          set -o pipefail
          cargo test -p uc-cli --all-targets 2>&1 | tee runtime-cli-test.log
      - name: Test executable libraries with exemplary coverage gate
        shell: bash
        run: |
          set -o pipefail
          cargo llvm-cov $COVERAGE_PACKAGES \
            --all-targets \
            --lcov \
            --output-path runtime-coverage.lcov \
            --fail-under-lines 90 \
            --fail-under-functions 90 \
            --fail-under-regions 90 \
            2>&1 | tee runtime-test.log
      - name: Architecture boundary check
        shell: bash
        run: |
          set -euo pipefail
          violations=$(grep -R -nE 'std::env::|env::var\(' \
            crates/uc-operation crates/uc-runtime crates/uc-adapters apps/uc-cli \
            --include='*.rs' \
            | grep -v '^crates/uc-adapters/build.rs:' || true)
          if [ -n "$violations" ]; then
            echo "Direct environment access outside configuration boundary:"
            echo "$violations"
            exit 1
          fi
      - name: Upload Runtime Foundation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-foundation-evidence
          path: |
            rustfmt.patch
            runtime-check.log
            runtime-clippy.log
            runtime-documentation.log
            runtime-rustdoc.log
            runtime-cli-test.log
            runtime-test.log
            runtime-coverage.lcov
          if-no-files-found: warn
          retention-days: 7

  protobuf:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - name: Breaking changes against main
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet origin/main...HEAD -- proto buf.yaml; then
            echo 'No protobuf contract changes in this PR.'
          elif git ls-tree -r origin/main --name-only | grep -q '^proto/'; then
            buf breaking --against '.git#branch=main'
          else
            echo 'No protobuf baseline exists on main; this PR establishes it.'
          fi
