name: Sync GitHub governance

on:
  pull_request:
    paths:
      - governance/github-manifest.json
      - governance/github-structure.json
      - scripts/sync_github_governance.py
      - scripts/sync_github_structure.py
      - scripts/sync_project_fields.py
      - .github/workflows/sync-governance.yml
  push:
    branches: [main]
    paths:
      - governance/github-manifest.json
      - governance/github-structure.json
      - scripts/sync_github_governance.py
      - scripts/sync_github_structure.py
      - scripts/sync_project_fields.py
      - .github/workflows/sync-governance.yml
  workflow_dispatch:
    inputs:
      mode:
        description: Reconciliation mode
        required: true
        type: choice
        default: reconcile
        options: [dry-run, reconcile, apply]
      confirmation:
        description: Type DELETE_UNMANAGED_GITHUB_METADATA only for destructive apply
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: github-governance
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate governance manifest
        run: python3 scripts/sync_github_governance.py --mode validate
      - name: Validate structure manifest
        run: python3 -m json.tool governance/github-structure.json >/dev/null
      - name: Compile governance scripts
        run: python3 -m py_compile scripts/sync_github_governance.py scripts/sync_github_structure.py scripts/sync_project_fields.py

  dry-run:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Report repository governance drift
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_governance.py --mode dry-run

  reconcile:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'reconcile')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight Project token
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          if [ -z "$PROJECT_TOKEN" ]; then
            echo "PROJECT_TOKEN is missing. Create a repository Actions secret with access to user Project #4." >&2
            exit 1
          fi
          GH_TOKEN="$PROJECT_TOKEN" gh project view 4 --owner nomed --format json >/dev/null
      - name: Reconcile labels, milestones, issue metadata and Project items
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_governance.py --mode apply --confirm DELETE_UNMANAGED_GITHUB_METADATA
      - name: Set native Project field values
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_project_fields.py
      - name: Reconcile native parent, sub-issue, dependency and roadmap metadata
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_structure.py

  apply:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'apply'
    needs: validate
    environment: github-governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight Project token
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          if [ -z "$PROJECT_TOKEN" ]; then
            echo "PROJECT_TOKEN is missing. Create a repository Actions secret with access to user Project #4." >&2
            exit 1
          fi
          GH_TOKEN="$PROJECT_TOKEN" gh project view 4 --owner nomed --format json >/dev/null
      - name: Reconcile with explicit cleanup policy
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_governance.py --mode apply --confirm "${{ inputs.confirmation }}"
      - name: Set native Project field values
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_project_fields.py
      - name: Reconcile issue structure and roadmap
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_structure.py
