name: Sync GitHub governance

on:
  issues:
    types: [opened, edited, reopened]
  pull_request:
    paths:
      - governance/github-manifest.json
      - governance/github-structure.json
      - scripts/sync_github_governance.py
      - scripts/sync_github_structure.py
      - scripts/preflight_project_token.py
      - .yukh/project.yaml
      - .github/workflows/sync-governance.yml
  push:
    branches: [main]
    paths:
      - governance/github-manifest.json
      - governance/github-structure.json
      - scripts/sync_github_governance.py
      - scripts/sync_github_structure.py
      - scripts/preflight_project_token.py
      - .yukh/project.yaml
      - .github/workflows/sync-governance.yml
  workflow_dispatch:
    inputs:
      mode:
        description: Reconciliation mode
        required: true
        type: choice
        default: reconcile
        options: [dry-run, reconcile, apply, yukh-apply]
      issue_number:
        description: Issue number for Yukh apply
        required: false
        type: number
      confirm_yukh_apply:
        description: Confirm Yukh Project mutations
        required: false
        type: boolean
        default: false
      confirmation:
        description: Type DELETE_UNMANAGED_GITHUB_METADATA only for destructive apply
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: github-governance-${{ github.event.issue.number || inputs.issue_number || github.ref }}
  cancel-in-progress: false

jobs:
  yukh-dry-run:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nomed/yukh@v0
        with:
          issue-number: ${{ github.event.issue.number }}
          project-number: ${{ vars.YUKH_PROJECT_NUMBER }}
          policy-path: .yukh/project.yaml
          mode: dry-run
          github-token: ${{ secrets.YUKH_PROJECT_TOKEN }}

  yukh-apply:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'yukh-apply' && inputs.confirm_yukh_apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nomed/yukh@v0
        with:
          issue-number: ${{ inputs.issue_number }}
          project-number: ${{ vars.YUKH_PROJECT_NUMBER }}
          policy-path: .yukh/project.yaml
          mode: apply
          apply-enabled: true
          github-token: ${{ secrets.YUKH_PROJECT_TOKEN }}

  validate:
    if: github.event_name != 'issues' && !(github.event_name == 'workflow_dispatch' && inputs.mode == 'yukh-apply')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate governance manifest
        run: python3 scripts/sync_github_governance.py --mode validate
      - name: Validate structure manifest
        run: python3 -m json.tool governance/github-structure.json >/dev/null
      - name: Compile governance scripts
        run: python3 -m py_compile scripts/sync_github_governance.py scripts/sync_github_structure.py scripts/preflight_project_token.py

  dry-run:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Report repository governance drift
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_governance.py --mode dry-run

  reconcile:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'reconcile')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight Project token
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/preflight_project_token.py
      - name: Reconcile labels, milestones, issue metadata and Project fields/items
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_governance.py --mode apply --confirm DELETE_UNMANAGED_GITHUB_METADATA
      - name: Reconcile native parent, sub-issue, dependency and roadmap metadata
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_structure.py

  apply:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'apply'
    needs: validate
    environment: github-governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight Project token
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/preflight_project_token.py
      - name: Reconcile with explicit cleanup policy
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_governance.py --mode apply --confirm "${{ inputs.confirmation }}"
      - name: Reconcile issue structure and roadmap
        env:
          REPO_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: python3 scripts/sync_github_structure.py
