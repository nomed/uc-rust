version: v2
clean: true
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.10
    out: gateway/gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: gateway/gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway:v2.28.0
    out: gateway/gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/openapiv2:v2.28.0
    out: gateway/gen/openapi
    opt:
      - allow_merge=true
      - merge_file_name=uc-runtime
      - generate_unbound_methods=false
inputs:
  - directory: proto
