apiVersion: apps/v1
kind: Deployment
metadata:
  name: uc-runtime
  labels:
    app.kubernetes.io/name: uc-runtime
    app.kubernetes.io/version: 0.1.0 # x-release-please-version
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uc-runtime
  template:
    metadata:
      labels:
        app: uc-runtime
        app.kubernetes.io/name: uc-runtime
        app.kubernetes.io/version: 0.1.0 # x-release-please-version
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: runtime
          image: ghcr.io/nomed/uc-runtime:0.1.0 # x-release-please-version
          imagePullPolicy: IfNotPresent
          args: ["--grpc-addr", "127.0.0.1:50051", "serve-grpc"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: grpc-internal
              containerPort: 50051
          readinessProbe:
            tcpSocket:
              port: grpc-internal
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc-internal
            periodSeconds: 10
        - name: gateway
          image: ghcr.io/nomed/uc-gateway:0.1.0 # x-release-please-version
          imagePullPolicy: IfNotPresent
          env:
            - name: UC_GATEWAY_ADDR
              value: 0.0.0.0:8080
            - name: UC_GRPC_ENDPOINT
              value: 127.0.0.1:50051
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: uc-runtime
  labels:
    app.kubernetes.io/name: uc-runtime
    app.kubernetes.io/version: 0.1.0 # x-release-please-version
spec:
  selector:
    app: uc-runtime
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
