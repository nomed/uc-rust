schema_version: 1
effective_date: 2026-07-18
namespace: uc-rust
legacy_roots:
  - .context/decisions
  - .context/rfcs

status_normalization:
  draft: Draft
  proposed: Proposed
  accepted: Accepted
  rejected: Rejected
  withdrawn: Withdrawn
  deprecated: Deprecated
  superseded: Superseded
  postponed: Proposed

reserved_identifiers:
  ADR:
    range: [1, 23]
  RFC:
    values: [1, 2]

rules:
  accepted_history: grandfathered
  nonterminal_without_collision: backfill-in-place
  normative_change_to_accepted: canonicalize-on-change
  duplicate_identifier: collision-remap
  malformed_record: manual-review

explicit_records:
  - path: .context/rfcs/RFC-0001-agentic-operating-system.md
    id: uc-rust:RFC-0001
    type: RFC
    status: Draft
    disposition: backfill-in-place
    aliases:
      - RFC-0001-agentic-operating-system.md
    rationale: Earliest retained RFC-0001 reservation for the agentic operating-system proposal.

  - path: .context/rfcs/RFC-0002-runtime-foundation.md
    id: uc-rust:RFC-0002
    type: RFC
    status: Accepted
    disposition: collision-remap
    aliases:
      - uc-rust:RFC-0001-runtime-foundation
      - RFC-0001-runtime-foundation.md
      - RFC-0001 — UC Runtime Foundation
    rationale: Resolves the duplicate RFC-0001 reservation with a canonical RFC-0002 path while preserving legacy locators as aliases.

validator_policy:
  legacy_files_are_schema_valid: false
  duplicate_canonical_ids_are_errors: true
  unknown_status_is_error: true
  missing_id_title_or_status_is_error: true
  accepted_semantic_backfill_is_error: true
