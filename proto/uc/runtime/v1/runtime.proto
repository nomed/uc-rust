syntax = "proto3";
package uc.runtime.v1;

import "google/api/annotations.proto";

option go_package = "github.com/nomed/uc-rust/gateway/gen/go/uc/runtime/v1;runtimev1";

service RuntimeService {
  rpc Ping(PingRequest) returns (PingResponse) {
    option (google.api.http) = {
      post: "/v1/runtime:ping"
      body: "*"
      additional_bindings {
        get: "/v1/runtime/ping"
      }
    };
  }
}

message PingRequest {
  string message = 1;
  string tenant_id = 2;
  string identity = 3;
  string correlation_id = 4;
  string idempotency_key = 5;
}

message PingResponse {
  string message = 1;
  string tenant_id = 2;
  string correlation_id = 3;
}
