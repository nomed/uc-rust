syntax = "proto3";
package uc.runtime.v1;

option go_package = "github.com/nomed/uc-rust/gateway/gen/go/uc/runtime/v1;runtimev1";

service RuntimeService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
  string tenant_id = 2;
  string identity = 3;
  string correlation_id = 4;
  string idempotency_key = 5;
}

message PingResponse {
  string message = 1;
  string tenant_id = 2;
  string correlation_id = 3;
}
